<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriCare - Consulta Nutricional</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">

        <!-- Loading -->
        <div id="loading-screen" class="screen">
            <div class="loading-content">
                <div class="loading-logo">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="22" stroke="#B7E4C7" stroke-width="3"/>
                        <path d="M16 28C16 28 20 24 24 28C28 24 32 28 32 28" stroke="#B7E4C7" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M18 20L18 22" stroke="#B7E4C7" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M30 20L30 22" stroke="#B7E4C7" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="loading-bar"><div class="loading-fill"></div></div>
                <p class="loading-text">Preparando sua consulta...</p>
            </div>
        </div>

        <!-- ====== RENDER CONTAINER ====== -->
        <!--
            Toda tela é renderizada dentro de #screen-container
            conforme o JSON vindo do NutritionistEngine.
            Exceção: telas fixas (loading).
        -->
        <div id="screen-container"></div>

    </div>
    <script src="script.js"></script>
</body>
</html>
